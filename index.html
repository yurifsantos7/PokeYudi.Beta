<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Showdown - Arena Emerald Completa</title>
    <style>
        :root { 
            --primary: #3498db; --gold: #f1c40f; --dark: #1e272e; --success: #27ae60; --danger: #e74c3c; 
            --phys: #d35400; --spec: #8e44ad; --emerald-green: #4da671; --emerald-dark: #2d5a43;
            --status: #7f8c8d;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; color: white; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .game-window { width: 95%; max-width: 1100px; height: 95vh; background: #222; border: 4px solid #444; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; }

        .screen { flex-grow: 1; padding: 20px; display: none; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        #battle-screen { 
            background: linear-gradient(to bottom, #80d0f0 0%, #a8e8a0 50%, #50b058 100%);
            position: relative;
            padding: 0;
            overflow: hidden;
            border-bottom: 8px solid #2d5a43;
        }

        .platform {
            position: absolute;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            transform: scaleY(0.4);
            z-index: 1;
            border: 5px solid rgba(255,255,255,0.1);
        }
        .platform-enemy { width: 280px; height: 180px; top: 130px; right: 100px; background: #60a048; }
        .platform-player { width: 500px; height: 280px; bottom: -50px; left: -80px; background: #88d070; }

        .poke-container { position: absolute; z-index: 2; transition: all 0.3s; text-align: center; }
        .enemy-pos { top: 70px; right: 160px; }
        .player-pos { bottom: 70px; left: 100px; }
        
        .sprite { image-rendering: pixelated; filter: drop-shadow(5px 5px 2px rgba(0,0,0,0.2)); }
        .enemy-pos .sprite { height: 130px; }
        .player-pos .sprite { height: 190px; }

        .status-box {
            position: absolute;
            width: 270px;
            background: #f8f8d8;
            border: 3px solid #606060;
            border-radius: 0 15px 0 15px;
            padding: 10px;
            color: #333;
            z-index: 3;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-enemy { top: 30px; left: 40px; }
        .status-player { bottom: 230px; right: 40px; }
        
        .status-avatar { width: 40px; height: 40px; image-rendering: pixelated; }

        .hp-bar-bg { background: #444; height: 12px; border-radius: 6px; border: 2px solid #000; overflow: hidden; margin: 5px 0; }
        .hp-bar { height: 100%; background: #50f850; transition: 0.5s; }
        .speed-tag { font-size: 11px; font-weight: bold; color: #2d5a43; }
        .ability-tag { font-size: 10px; font-style: italic; color: #555; display: block; margin-top: 2px;}

        .controls-area { position: absolute; bottom: 0; width: 100%; background: #e0e0e0; height: 210px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px; padding: 15px; border-top: 5px solid #505050; box-sizing: border-box; }
        #log { background: #fff; border: 4px solid #88a0b8; border-radius: 8px; padding: 12px; color: #444; font-family: monospace; font-size: 15px; overflow-y: auto; font-weight: bold; }
        
        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 10px; border-radius: 6px; border: 2px solid #505050; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.1s; }
        .btn-move { background: #f0f0f0; color: #333; height: 55px; }
        .btn-move.phys { border-left: 10px solid var(--phys); }
        .btn-move.spec { border-left: 10px solid var(--spec); }
        .btn-move.status { border-left: 10px solid var(--status); } 
        .btn-switch { background: #60a860; color: white; width: 100%; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .option-card { background: #2c3e50; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; border: 2px solid transparent; transition: transform 0.1s;}
        .option-card:hover { transform: scale(1.05); }
        .option-card.selected { border-color: var(--primary); background: #34495e; box-shadow: 0 0 10px var(--primary); }
        .option-card img { height: 55px; image-rendering: pixelated; }
        .type-badge { padding: 2px 5px; border-radius: 4px; font-size: 8px; margin: 2px; display: inline-block; color: white; text-transform: uppercase; }
        .item-select { width: 100%; margin-top: 5px; font-size: 10px; background: #111; color: white; border: 1px solid #555; }
    </style>
</head>
<body>

<div class="game-window">
    <div id="trainer-screen" class="screen active-screen">
        <h1 style="text-align:center; color:var(--gold);">ESCOLHA SEU AVATAR</h1>
        <div class="grid" id="trainer-grid"></div>
    </div>

    <div id="poke-screen" class="screen">
        <h1 id="builder-title" style="text-align:center;">MONTE SUA EQUIPE (0/6)</h1>
        <div class="grid" id="poke-grid"></div>
        <div style="text-align:center; padding: 20px;">
            <button id="next-btn" disabled onclick="showOpponentScreen()" style="padding:15px 50px; background:var(--primary); color:white; border:none; font-weight:bold; cursor:pointer; border-radius:5px;">AVANÇAR</button>
        </div>
    </div>

    <div id="opponent-screen" class="screen">
        <h1 style="text-align:center; color:var(--danger);">ESCOLHA SEU ADVERSÁRIO</h1>
        <div class="grid" id="opponent-grid"></div>
    </div>

    <div id="battle-screen" class="screen">
        <div class="platform platform-enemy"></div>
        <div id="enemy-ui-anchor"></div>
        <div class="poke-container enemy-pos">
            <img id="enemy-poke-img" class="sprite" src="">
        </div>

        <div class="platform platform-player"></div>
        <div id="player-ui-anchor"></div>
        <div class="poke-container player-pos">
            <img id="player-poke-img" class="sprite" src="">
        </div>

        <div class="controls-area">
            <div id="log">Aguardando início...</div>
            <div id="action-panel">
                <div id="move-panel">
                    <div id="move-controls" class="move-grid"></div>
                    <button class="btn btn-switch" onclick="toggleSwitchMenu(true)">🔄 TROCAR POKÉMON</button>
                </div>
                <div id="switch-panel" style="display:none;">
                    <div id="switch-controls" class="move-grid"></div>
                    <button class="btn btn-switch" style="background:var(--danger)" onclick="toggleSwitchMenu(false)">CANCELAR</button>
                </div>
            </div>
        </div>
    </div>
</div>

    POKEDEX.sort((a, b) => a.name.localeCompare(b.name));

    const MASTERS = [
        { name: "Red", sprite: "red", team: ["Pikachu", "Charizard", "Blastoise", "Venusaur", "Lapras", "Snorlax"] },
        { name: "Cynthia", sprite: "cynthia", team: ["Spiritomb", "Milotic", "Garchomp", "Togekiss", "Roserade", "Lucario"] },
        { name: "Steven", sprite: "steven", team: ["Metagross", "Aggron", "Skarmory", "Armaldo", "Excadrill", "Salamence"] },
        { name: "Giovanni", sprite: "giovanni", team: ["Nidoking", "Tyranitar", "Garchomp", "Aggron", "Excadrill", "Machamp"] },
        { name: "Guzma", sprite: "guzma", team: ["Golisopod", "Scizor", "Volcarona", "Armaldo", "Shedinja", "Mimikyu"] },
        { name: "N", sprite: "n", team: ["Zoroark", "Zekrom", "Reshiram", "Hydreigon", "Gastrodon", "Ferrothorn"] }
    ];

    let playerTeam = [], enemyTeam = [], pIdx = 0, eIdx = 0, forceSwitch = false;
    let chosenTrainer = "";
    let enemyMaster = null;

    function init() {
        const tGrid = document.getElementById("trainer-grid");
        TRAINERS.forEach(t => {
            const div = document.createElement("div"); div.className = "option-card";
            div.innerHTML = `<img src="https://play.pokemonshowdown.com/sprites/trainers/${t}.png"><p style="text-transform: capitalize;">${t}</p>`;
            div.onclick = () => { chosenTrainer = t; selectPokeScreen(); };
            tGrid.appendChild(div);
        });
    }

    function selectPokeScreen() {
        document.getElementById("trainer-screen").classList.remove("active-screen");
        document.getElementById("poke-screen").classList.add("active-screen");
        const pGrid = document.getElementById("poke-grid");
        pGrid.innerHTML = "";
        
        POKEDEX.forEach((p, idx) => {
            const div = document.createElement("div"); div.className = "option-card"; div.id = `card-${idx}`;
            let items = ITEMS.map(i => `<option value="${i.id}">${i.name}</option>`).join("");
            let types = p.type.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t]}">${t}</span>`).join("");
            div.innerHTML = `<img src="https://play.pokemonshowdown.com/sprites/gen5ani/${p.sprite}.gif"><div>${p.name}<br><small style="color:#aaa">${p.ability}</small></div>${types}<select id="item-${idx}" class="item-select" onclick="event.stopPropagation()">${items}</select>`;
            div.onclick = () => togglePoke(p, idx);
            pGrid.appendChild(div);
        });
    }

    function togglePoke(p, idx) {
        const item = document.getElementById(`item-${idx}`).value;
        const found = playerTeam.findIndex(x => x.name === p.name);
        if (found > -1) { 
            playerTeam.splice(found, 1); 
            document.getElementById(`card-${idx}`).classList.remove("selected"); 
        }
        else if (playerTeam.length < 6) { 
            playerTeam.push({...JSON.parse(JSON.stringify(p)), maxHp: p.hp, item: item, sleep: 0, protect: false}); 
            document.getElementById(`card-${idx}`).classList.add("selected"); 
        }
        document.getElementById("builder-title").innerText = `MONTE SUA EQUIPE (${playerTeam.length}/6)`;
        document.getElementById("next-btn").disabled = playerTeam.length === 0;
    }

    function showOpponentScreen() {
        document.getElementById("poke-screen").classList.remove("active-screen");
        document.getElementById("opponent-screen").classList.add("active-screen");
        const oGrid = document.getElementById("opponent-grid"); 
        oGrid.innerHTML = "";
        
        MASTERS.forEach(m => {
            const div = document.createElement("div"); div.className = "option-card";
            div.innerHTML = `<img src="https://play.pokemonshowdown.com/sprites/trainers/${m.sprite}.png"><h3>${m.name}</h3>`;
            div.onclick = () => startBattle(m);
            oGrid.appendChild(div);
        });
    }

    function startBattle(m) {
        enemyMaster = m;
        enemyTeam = m.team.map(name => {
            const b = POKEDEX.find(p => p.name === name) || POKEDEX[0];
            return {...JSON.parse(JSON.stringify(b)), maxHp: b.hp, item: "none", sleep: 0, protect: false};
        });
        document.getElementById("opponent-screen").classList.remove("active-screen");
        document.getElementById("battle-screen").classList.add("active-screen");
        updateField(); 
        renderMoves();
        writeLog(`A batalha contra o Mestre ${m.name} começou!`);
    }

    function updateField() {
        const p = playerTeam[pIdx], e = enemyTeam[eIdx];
        document.getElementById("player-poke-img").src = `https://play.pokemonshowdown.com/sprites/gen5ani-back/${p.sprite}.gif`;
        document.getElementById("enemy-poke-img").src = `https://play.pokemonshowdown.com/sprites/gen5ani/${e.sprite}.gif`;
        document.getElementById("player-ui-anchor").innerHTML = renderStatus(p, true);
        document.getElementById("enemy-ui-anchor").innerHTML = renderStatus(e, false);
    }

    function renderStatus(p, isP) {
        const perc = (p.hp / p.maxHp) * 100;
        const color = perc < 20 ? "#f85838" : (perc < 50 ? "#f8d030" : "#50f850");
        const avatarImg = isP ? chosenTrainer : enemyMaster.sprite;
        const sleepTag = p.sleep && p.sleep > 0 ? `<span style="color:#735797; font-weight:bold;">(SLP)</span>` : "";

        return `
            <div class="status-box ${isP ? 'status-player' : 'status-enemy'}">
                <img src="https://play.pokemonshowdown.com/sprites/trainers/${avatarImg}.png" class="status-avatar">
                <div style="flex-grow:1;">
                    <div style="display:flex; justify-content:space-between;"><b>${p.name.toUpperCase()} ${sleepTag}</b> <span>Lv50</span></div>
                    <div class="hp-bar-bg"><div class="hp-bar" style="width:${perc}%; background:${color}"></div></div>
                    <div style="display:flex; justify-content:space-between;">
                        <span class="speed-tag">SPE: ${p.spe} <span class="ability-tag">HAB: ${p.ability}</span></span>
                        <span style="font-size:10px;">${Math.ceil(p.hp)}/${p.maxHp}</span>
                    </div>
                </div>
            </div>
        `;
    }

    function renderMoves() {
        const p = playerTeam[pIdx];
        const ctrl = document.getElementById("move-controls"); ctrl.innerHTML = "";
        p.moves.forEach(m => {
            const btn = document.createElement("button");
            btn.className = `btn btn-move ${m.c}`;
            btn.innerHTML = `${m.n}<br><small>${m.t}</small>`;
            btn.onclick = () => executeTurn(m);
            ctrl.appendChild(btn);
        });
        document.getElementById("move-panel").style.display = "block";
        document.getElementById("switch-panel").style.display = "none";
    }

    function toggleSwitchMenu(show) {
        document.getElementById("move-panel").style.display = show ? "none" : "block";
        document.getElementById("switch-panel").style.display = show ? "block" : "none";
        if(show) {
            const ctrl = document.getElementById("switch-controls"); ctrl.innerHTML = "";
            playerTeam.forEach((pk, i) => {
                const btn = document.createElement("button"); btn.className = "btn btn-switch";
                btn.innerHTML = `${pk.name} (${Math.ceil(pk.hp)} HP)`;
                btn.disabled = pk.hp <= 0 || i === pIdx;
                btn.onclick = () => { 
                    pIdx = i; 
                    
                    // LÓGICA DE PASSAR OS STATUS DO BATON PASS
                    if (window.batonPassMods) {
                        let newP = playerTeam[pIdx];
                        let base = POKEDEX.find(x => x.name === newP.name);
                        newP.atk = base.atk * window.batonPassMods.atk;
                        newP.def = base.def * window.batonPassMods.def;
                        newP.spa = base.spa * window.batonPassMods.spa;
                        writeLog(`${newP.name} assumiu recebendo os status alterados!`);
                        window.batonPassMods = null; // Limpa o baton pass
                    }

                    updateField(); 
                    if(forceSwitch) { forceSwitch = false; renderMoves(); } 
                    else { enemyAttack(); } 
                };
                ctrl.appendChild(btn);
            });
        }
    }

    async function executeTurn(move) {
        const p = playerTeam[pIdx], e = enemyTeam[eIdx];
        document.getElementById("move-panel").style.display = "none";
        let pSpe = p.spe * (p.item === "choice-scarf" ? 1.5 : 1);
        
        // Zera o contador de protect para o novo turno
        p.protect = false; e.protect = false;
        
        if (pSpe >= e.spe) { 
            await attack(p, e, move, true); 
            if(e.hp > 0 && !forceSwitch) await enemyAttack(); 
        } else { 
            await enemyAttack(); 
            if(p.hp > 0 && !forceSwitch) await attack(p, e, move, true); 
        }
        if (p.hp > 0 && e.hp > 0 && !forceSwitch) renderMoves();
    }

    // Função de efeitos visuais
    async function playAttackEffect(isP, move) {
        if(move.c === 'status' && move.n !== 'Spore') return; // Status não fazem shake (exceto Spore)

        const attacker = document.getElementById(isP ? "player-poke-img" : "enemy-poke-img");
        const defender = document.getElementById(isP ? "enemy-poke-img" : "player-poke-img");
        const color = TYPE_COLORS[move.t] || "#fff";

        if (move.c === 'phys') {
            attacker.classList.add(isP ? "atk-phys-p" : "atk-phys-e");
        } else if (move.c === 'spec') {
            attacker.style.filter = `drop-shadow(0 0 10px ${color}) brightness(1.5)`;
        }

        await new Promise(r => setTimeout(r, 200));

        if (move.c !== 'status' || move.n === "Spore") {
            if(move.n !== "Spore") defender.classList.add("shake", "hit");
            const vfx = document.createElement("div");
            vfx.className = "vfx-element";
            vfx.style.backgroundColor = color;
            vfx.style.boxShadow = `0 0 20px ${color}`;
            vfx.style.width = "60px";
            vfx.style.height = "60px";
            const defRect = defender.getBoundingClientRect();
            const arenaRect = document.getElementById("battle-screen").getBoundingClientRect();
            vfx.style.left = (defRect.left - arenaRect.left + 50) + "px";
            vfx.style.top = (defRect.top - arenaRect.top + 50) + "px";
            vfx.style.animation = "vfx-burst 0.4s forwards";
            document.getElementById("battle-screen").appendChild(vfx);
            setTimeout(() => vfx.remove(), 400);
        }

        await new Promise(r => setTimeout(r, 300));
        attacker.classList.remove("atk-phys-p", "atk-phys-e");
        attacker.style.filter = "";
        defender.classList.remove("shake", "hit");
    }

    async function attack(atk, def, move, isP) {
        // MECÂNICA DE SONO
        if (atk.sleep > 0) {
            writeLog(`${atk.name} está dormindo profundamente!`);
            atk.sleep--;
            await new Promise(r => setTimeout(r, 800));
            updateField();
            return;
        }

        writeLog(`${atk.name} usou ${move.n}!`);
        await playAttackEffect(isP, move);
        await new Promise(r => setTimeout(r, 200));

        // MECÂNICA DE PROTECT (Evita danos e Status ofensivos no alvo)
        if (def.protect && move.c !== "status") {
            writeLog(`${def.name} protegeu-se do ataque!`);
            await new Promise(r => setTimeout(r, 800));
            return;
        }
        if (def.protect && move.n === "Spore") {
            writeLog(`${def.name} protegeu-se do efeito!`);
            await new Promise(r => setTimeout(r, 800));
            return;
        }

        if (move.c === "status") {
            // SPORE
            if (move.n === "Spore") {
                if(def.type.includes("Grass")) {
                    writeLog(`Não afetou ${def.name}!`);
                } else {
                    def.sleep = 3;
                    writeLog(`${def.name} adormeceu!`);
                }
            } 
            // PROTECT
            else if (move.n === "Protect") {
                atk.protect = true;
                writeLog(`${atk.name} se protegeu contra ataques!`);
            } 
            // BATON PASS
            else if (move.n === "Baton Pass") {
                let alive = isP ? playerTeam.filter((x,i) => x.hp > 0 && i !== pIdx) : enemyTeam.filter((x,i) => x.hp > 0 && i !== eIdx);
                if (alive.length === 0) {
                    writeLog(`Mas falhou, pois não há aliados!`);
                } else {
                    writeLog(`${atk.name} preparou o Baton Pass!`);
                    let base = POKEDEX.find(x => x.name === atk.name);
                    // Armazena no Global os Modificadores exatos
                    window.batonPassMods = { 
                        atk: atk.atk / base.atk, 
                        def: atk.def / base.def, 
                        spa: atk.spa / base.spa 
                    };
                    if (isP) {
                        forceSwitch = true;
                        toggleSwitchMenu(true);
                        return; // O sistema pausa aqui até a troca
                    } else {
                        eIdx = enemyTeam.indexOf(alive[Math.floor(Math.random()*alive.length)]);
                        let newActive = enemyTeam[eIdx];
                        let newBase = POKEDEX.find(x => x.name === newActive.name);
                        newActive.atk = newBase.atk * window.batonPassMods.atk;
                        newActive.def = newBase.def * window.batonPassMods.def;
                        newActive.spa = newBase.spa * window.batonPassMods.spa;
                        writeLog(`O inimigo enviou ${newActive.name} com os status transferidos!`);
                        window.batonPassMods = null;
                        updateField();
                    }
                }
            } 
            // BUFFS ORIGINAIS MANTIDOS
            else if (move.n === "Swords Dance" || move.n === "Dragon Dance" || move.n === "Nasty Plot") {
                if(move.n === "Nasty Plot") atk.spa *= 2; else atk.atk *= 2;
                writeLog(`O status ofensivo de ${atk.name} subiu drasticamente!`);
            }
            else if (move.n === "Iron Defense") {
                atk.def *= 2;
                writeLog(`A Defesa de ${atk.name} subiu drasticamente!`);
            }
            
            updateField();
            await new Promise(r => setTimeout(r, 800));
            return;
        }

        // LÓGICA DE TIPOS (EFETIVIDADE)
        let typeMult = 1;
        def.type.forEach(t => {
            if (TYPE_CHART[move.t] && TYPE_CHART[move.t][t] !== undefined) {
                typeMult *= TYPE_CHART[move.t][t];
            }
        });

        if (typeMult > 1) writeLog("É super efetivo!");
        else if (typeMult > 0 && typeMult < 1) writeLog("Não é muito efetivo...");
        else if (typeMult === 0) { writeLog(`Não afetou ${def.name}!`); updateField(); return; }

        // STAB (Same Type Attack Bonus)
        let stab = atk.type.includes(move.t) ? 1.5 : 1;

        if (def.ability === "Wonder Guard" && typeMult <= 1) {
            writeLog(`Não afetou ${def.name} devido à Wonder Guard!`);
            return;
        }
        
        if (def.ability === "Levitate" && move.t === "Ground") { writeLog(`Não afetou ${def.name}!`); return; }
        if (def.ability === "Flash Fire" && move.t === "Fire") { writeLog(`${def.name} absorveu o fogo!`); return; }
        if (def.ability === "Water Absorb" && move.t === "Water") { writeLog(`${def.name} absorveu a água!`); return; }
        if (def.ability === "Storm Drain" && move.t === "Water") { writeLog(`Storm Drain anulou o ataque!`); return; }

        let powerMod = 1;
        if (atk.ability === "Technician" && move.p <= 60) powerMod = 1.5;

        // CÁLCULO FINAL DE DANO
        let dmg = ((move.p * powerMod) * (move.c === 'phys' ? atk.atk : atk.spa)) / (move.c === 'phys' ? def.def : def.spd) * 0.5;
        dmg *= typeMult;
        dmg *= stab;
        
        if (atk.ability === "Tough Claws" && move.c === 'phys') dmg *= 1.3;
        if (atk.ability === "Sheer Force") dmg *= 1.3;
        if (atk.ability === "Blaze" && move.t === "Fire" && atk.hp < atk.maxHp * 0.3) dmg *= 1.5;
        if (atk.ability === "Torrent" && move.t === "Water" && atk.hp < atk.maxHp * 0.3) dmg *= 1.5;
        if (atk.ability === "Overgrow" && move.t === "Grass" && atk.hp < atk.maxHp * 0.3) dmg *= 1.5;
        if (atk.item === "life-orb") { dmg *= 1.3; atk.hp -= atk.maxHp * 0.1; }
        if (def.ability === "Thick Fat" && (move.t === "Fire" || move.t === "Ice")) dmg *= 0.5;
        if (def.ability === "Multiscale" && def.hp === def.maxHp) dmg *= 0.5;
        
        let prevHp = def.hp;
        def.hp = Math.max(0, def.hp - dmg);
        
        if (def.ability === "Sturdy" && prevHp === def.maxHp && def.hp === 0) {
            def.hp = 1;
            writeLog(`${def.name} aguentou o golpe com Sturdy!`);
        }
        
        if (def.item === "rocky-helmet" && move.c === 'phys') atk.hp = Math.max(0, atk.hp - atk.maxHp * 0.15);
        if (def.ability === "Rough Skin" && move.c === 'phys') atk.hp = Math.max(0, atk.hp - atk.maxHp * 0.125);

        updateField();
        await new Promise(r => setTimeout(r, 800));
        
        if(def.hp <= 0) handleFaint(!isP);
        if(atk.hp > 0 && def.hp > 0 && atk.hp <= 0) handleFaint(isP);
    }

    async function enemyAttack() {
        const e = enemyTeam[eIdx];
        const move = e.moves[Math.floor(Math.random() * e.moves.length)];
        await attack(e, playerTeam[pIdx], move, false);
    }

    function handleFaint(isP) {
        if(isP) {
            writeLog(`${playerTeam[pIdx].name} caiu!`);
            if(playerTeam.every(x => x.hp <= 0)) { alert("Você foi derrotado!"); location.reload(); }
            forceSwitch = true; toggleSwitchMenu(true);
        } else {
            writeLog(`O ${enemyTeam[eIdx].name} inimigo caiu!`);
            eIdx++;
            if(eIdx >= enemyTeam.length) { alert("Você venceu o Mestre " + enemyMaster.name + "!"); location.reload(); }
            else { updateField(); renderMoves(); }
        }
    }

    function writeLog(m) {
        const log = document.getElementById("log");
        log.innerHTML = `> ${m}<br>` + log.innerHTML;
    }

    init();
</script>
</body>
</html>
